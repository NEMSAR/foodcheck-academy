    <style>
        /* Reseteamos los márgenes para que ocupe el 100% de la pantalla sin bordes blancos */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Oculta la doble barra de scroll */
            background-color: #030712; /* Mismo fondo oscuro de tu web para que no parpadee en blanco al cargar */
        }
        
        /* Hacemos que el Iframe ocupe absolutamente todo el espacio */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
